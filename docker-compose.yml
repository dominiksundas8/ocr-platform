version: '3.8'

services:
  # ----------------------------------------
  # PostgreSQL: Database Esercizio/Produzione
  # ----------------------------------------
  db:
      image: postgres:15-alpine
      environment:
        - POSTGRES_USER=${POSTGRES_USER}
        - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
        - POSTGRES_DB=${POSTGRES_DB}
      ports:
        - "5433:5432"
      restart: always
      command: ["postgres", "-c", "max_connections=300"]
      volumes:
        - postgres_data:/var/lib/postgresql/data
      healthcheck:
        test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
        interval: 5s
        timeout: 5s
        retries: 5
      networks:
        - ocr_net

  # ----------------------------------------
  # REDIS: Message Broker (Celery Queue)
  # ----------------------------------------
  redis:
      image: redis:7-alpine
      restart: always
      ports:
        - "6379:6379"
      healthcheck:
        test: ["CMD", "redis-cli", "ping"]
        interval: 5s
        timeout: 3s
        retries: 5
      networks:
        - ocr_net

  # ----------------------------------------
  # MONGODB: Document Storage (OCR Results)
  # ----------------------------------------
  mongodb:
      image: mongo:7-jammy
      restart: always
      environment:
        - MONGO_INITDB_ROOT_USERNAME=${MONGO_INITDB_ROOT_USERNAME}
        - MONGO_INITDB_ROOT_PASSWORD=${MONGO_INITDB_ROOT_PASSWORD}
      volumes:
        - mongo_data:/data/db
        - ./mongodb/init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
      healthcheck:
        test: ["CMD", "mongosh", "--quiet", "--username", "${MONGO_INITDB_ROOT_USERNAME}", "--password", "${MONGO_INITDB_ROOT_PASSWORD}", "--eval", "db.adminCommand('ping')"]
        interval: 10s
        timeout: 5s
        retries: 5
      networks:
        - ocr_net

  # ----------------------------------------
  # DJANGO: Backend Principale e Orchestratore
  # ----------------------------------------
  backend:
      build: ./backend
      env_file: .env
      environment:
        - EVENTLET_NO_GREENDNS=yes
      command: sh -c "python manage.py migrate --no-input && python manage.py runserver 0.0.0.0:8000"
      volumes:
        - ./backend:/app
      ports:
        - "8000:8000"
      depends_on:
        db:
          condition: service_healthy
        redis:
          condition: service_healthy
      networks:
        - ocr_net

  # ----------------------------------------
  # CELERY WORKER: Esecuzione Task Asincroni
  # ----------------------------------------
  celery_worker:
      build: ./backend
      env_file: .env
      environment:
        - EVENTLET_NO_GREENDNS=yes
      # 🚀 ENTRYPOINT HARDENED: Attende la risoluzione DNS di redis prima di partire
      command: sh -c "until ping -c 1 redis; do echo 'Waiting for redis DNS...'; sleep 1; done && celery -A core worker -l info -P eventlet -c 100"
      volumes:
        - ./backend:/app
      depends_on:
        redis:
          condition: service_healthy
      networks:
        - ocr_net

  # ----------------------------------------
  # FASTAPI: Microservizio Vision AI (Gemini)
  # ----------------------------------------
  ocr_service:
      build: ./ocr_service
      env_file: .env
      command: uvicorn main:app --host 0.0.0.0 --port 8001 --reload
      volumes:
        - ./ocr_service:/app
      ports:
        - "8001:8001"
      networks:
        - ocr_net

  # ----------------------------------------
  # NEXT.JS: Interfaccia Utente
  # ----------------------------------------
  frontend:
      build: ./frontend
      env_file: .env
      command: npm run dev
      volumes:
        - ./frontend:/app
        - /app/node_modules
      ports:
        - "3000:3000"
      environment:
        - NEXTAUTH_URL=http://localhost:3000
        - NEXTAUTH_SECRET=secret_sviluppo_deep_ex_2026
        - WATCHPACK_POLLING=true
      networks:
        - ocr_net

networks:
  ocr_net:
    driver: bridge

volumes:
  postgres_data:
  mongo_data:
