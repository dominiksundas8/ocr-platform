version: '3.8'

services:
  # ----------------------------------------
  # PostgreSQL: Database Esercizio/Produzione
  # ----------------------------------------
  db:
      image: postgres:15-alpine
      environment:
        - POSTGRES_USER=${POSTGRES_USER}
        - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
        - POSTGRES_DB=${POSTGRES_DB}
      ports:
        - "5433:5432"
      restart: always
      volumes:
        - postgres_data:/var/lib/postgresql/data
      healthcheck:
        test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
        interval: 5s
        timeout: 5s
        retries: 5

  # ----------------------------------------
  # REDIS: Message Broker (Celery Queue)
  # ----------------------------------------
  redis:
      image: redis:7-alpine
      restart: always
      ports:
        - "6379:6379"
      healthcheck:
        test: ["CMD", "redis-cli", "ping"]
        interval: 5s
        timeout: 3s
        retries: 5

  # ----------------------------------------
  # DJANGO: Backend Principale e Orchestratore
  # ----------------------------------------
  backend:
      build: ./backend
      env_file: .env
      command: sh -c "python manage.py migrate --no-input && python manage.py runserver 0.0.0.0:8000"
      volumes:
        - ./backend:/app
      ports:
        - "8000:8000"
      depends_on:
        db:
          condition: service_healthy
        redis:
          condition: service_healthy

  # ----------------------------------------
  # CELERY WORKER: Esecuzione Task Asincroni
  # ----------------------------------------
  celery_worker:
      build: ./backend
      env_file: .env
      command: celery -A core worker -l info --pool=solo
      volumes:
        - ./backend:/app
      depends_on:
        redis:
          condition: service_healthy

  # ----------------------------------------
  # FASTAPI: Microservizio Vision AI (Gemini)
  # ----------------------------------------
  ocr_service:
      build: ./ocr_service
      env_file: .env
      command: uvicorn main:app --host 0.0.0.0 --port 8001 --reload
      volumes:
        - ./ocr_service:/app
      ports:
        - "8001:8001"

  # ----------------------------------------
  # NEXT.JS: Interfaccia Utente
  # ----------------------------------------
  frontend:
      build: ./frontend
      env_file: .env
      command: npm run dev
      volumes:
        - ./frontend:/app
        - /app/node_modules
      ports:
        - "3000:3000"
      environment:
        - WATCHPACK_POLLING=true

volumes:
  postgres_data:
