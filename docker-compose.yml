version: '3.8'

services:
  # ----------------------------------------
  # PostgreSQL: Database Esercizio/Produzione
  # ----------------------------------------
  db:
      image: postgres:15-alpine
      environment:
        - POSTGRES_USER=${POSTGRES_USER}
        - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
        - POSTGRES_DB=${POSTGRES_DB}
      ports:
        - "5433:5432"
      restart: always
      volumes:
        - postgres_data:/var/lib/postgresql/data
      healthcheck:
        test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
        interval: 5s
        timeout: 5s
        retries: 5

  # ----------------------------------------
  # DJANGO: Backend Principale e Orchestratore
  # ----------------------------------------
  backend:
      build: ./backend
      command: sh -c "python manage.py makemigrations api --no-input && python manage.py migrate --no-input && python manage.py runserver 0.0.0.0:8000"
      volumes:
        - ./backend:/app
      ports:
        - "8000:8000"
      environment:
        - DATABASE_URL=${DATABASE_URL}
        - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
        - DJANGO_DEBUG=${DJANGO_DEBUG}
        - INTERNAL_API_SECRET=${INTERNAL_API_SECRET}
      depends_on:
        - db

  # ----------------------------------------
  # FASTAPI: Microservizio Vision AI (Gemini)
  # ----------------------------------------
  ocr_service:
      build: ./ocr_service
      command: uvicorn main:app --host 0.0.0.0 --port 8001 --reload
      volumes:
        - ./ocr_service:/app
      ports:
        - "8001:8001"
      environment:
        - GEMINI_API_KEY=${GEMINI_API_KEY}
        - INTERNAL_API_SECRET=${INTERNAL_API_SECRET}

  # ----------------------------------------
  # NEXT.JS: Interfaccia Utente
  # ----------------------------------------
  frontend:
      build: ./frontend
      command: npm run dev
      volumes:
        - ./frontend:/app
        - /app/node_modules
      ports:
        - "3000:3000"
      environment:
        - WATCHPACK_POLLING=true
        - NEXTAUTH_URL=${NEXTAUTH_URL}
        - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}

volumes:
  postgres_data:
